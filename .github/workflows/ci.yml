name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Smoke test orchestration in fake mode
        env:
          USE_FAKE_LLM: 'true'
        run: |
          python main.py
          test -f run_output.json

      - name: Smoke test API import
        env:
          USE_FAKE_LLM: 'true'
        run: |
          python -c "from ai_solutions_agency.api import app; print(app.title)"

      - name: Build Docker image
        run: |
          docker build -t ai-solutions-agency-os:ci .
